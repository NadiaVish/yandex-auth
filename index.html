<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход выполнен!</title>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; padding-top: 100px; background: #f4f7f9; color: #333; }
        .btn { background: #3498db; color: white; padding: 16px 32px; border: none; border-radius: 12px; font-size: 18px; cursor: pointer; text-transform: uppercase; font-weight: bold; box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3); }
        .btn:hover { background: #2980b9; }
        .status-text { margin-bottom: 30px; font-size: 20px; }
    </style>
</head>
<body>
    <div class="status-text">
        <h2 id="msg">✅ Авторизация получена</h2>
        <p>Нажмите кнопку, чтобы вернуться в Todo App:</p>
    </div>
    
    <button class="btn" onclick="sendTokenToApp()">ВЕРНУТЬСЯ В ПРИЛОЖЕНИЕ</button>

    <script>
    // 1. Берем фрагмент (там токен) и параметры запроса (там наш state)
    const fragment = window.location.hash;
    const urlParams = new URLSearchParams(window.location.search);
    
    // 2. Достаем наш оригинальный адрес (localhost с нужным портом)
    const origin = urlParams.get('state') || "http://localhost:5000";

    function sendTokenToApp() {
        if (!fragment) return;

        // Пытаемся разбудить Windows версию
        window.location.href = "todoapp://oauth" + fragment;

        // Пытаемся вернуться в Web (на ПРАВИЛЬНЫЙ порт)
        setTimeout(() => {
            window.location.href = origin + "/" + fragment;
        }, 1000);

        document.getElementById('msg').innerText = "✅ Готово! Возвращаемся в приложение...";
    }

    if (fragment) {
        setTimeout(sendTokenToApp, 500);
    }
</script>


</body>
</html>
