<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход выполнен!</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 80px; background: #f4f7f9; }
        .btn { background: #3498db; color: white; padding: 18px 30px; border: none; border-radius: 12px; font-size: 18px; cursor: pointer; text-decoration: none; margin: 10px; display: none; width: 300px; font-weight: bold; }
        .web-btn { background: #2ecc71; }
    </style>
</head>
<body>
    <h2>✅ Авторизация успешна</h2>
    <p id="instruction">Загрузка...</p>
    
    <!-- Кнопка для Windows -->
    <button id="winBtn" class="btn" onclick="handleWindows()">ВЕРНУТЬСЯ В ПРИЛОЖЕНИЕ</button>
    
    <!-- Кнопка для Web -->
    <button id="webBtn" class="btn web-btn" onclick="handleWeb()">ЗАВЕРШИТЬ ВХОД</button>

    <script>
        const hash = window.location.hash;
        const urlParams = new URLSearchParams(window.location.search);
        
        // Ищем state (твой origin из loginForWeb)
        const stateOrigin = urlParams.get('state') || (hash.includes('state=') ? new URLSearchParams(hash.substring(1)).get('state') : null);
        const isWeb = stateOrigin !== null;

        if (isWeb) {
            document.getElementById('webBtn').style.display = 'inline-block';
            document.getElementById('instruction').innerText = "Нажмите кнопку, чтобы вернуться в приложение.";
        } else {
            document.getElementById('winBtn').style.display = 'inline-block';
            document.getElementById('instruction').innerText = "Приложение откроется автоматически. Если нет — нажмите кнопку.";
            // Авто-запуск для Windows
            setTimeout(handleWindows, 1000);
        }

        function handleWindows() {
            if (hash) {
                window.location.href = "todoapp://oauth" + hash;
                // Пытаемся закрыть вкладку через секунду после "пинка" приложения
                setTimeout(() => { window.close(); }, 1500);
            }
        }

        function handleWeb() {

             const params = new URLSearchParams(hash.substring(1));
        const token = params.get('access_token');

        if (token) {
            // Ключ, который обычно ищет flutter_secure_storage в вебе
            localStorage.setItem('yandex_token', token); 
            
          
        }
            // В Вебе нам не нужно никуда переходить, просто закрываемся.
            // Пользователь окажется в первой вкладке, где нажмет "ГОТОВО".
            window.close();
            
            // Если браузер заблокировал автоматическое закрытие:
            document.getElementById('instruction').innerHTML = 
                "<b>Вкладка не закрылась?</b><br>Закройте её вручную и нажмите 'ГОТОВО' в приложении.";
        }
    </script>
</body>
</html>
