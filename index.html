<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход выполнен!</title>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; padding-top: 100px; background: #f4f7f9; color: #333; }
        .btn { background: #3498db; color: white; padding: 16px 32px; border: none; border-radius: 12px; font-size: 18px; cursor: pointer; text-transform: uppercase; font-weight: bold; box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3); }
        .btn:hover { background: #2980b9; }
        .status-text { margin-bottom: 30px; font-size: 20px; }
    </style>
</head>
<body>
    <div class="status-text">
        <h2 id="msg">✅ Авторизация получена</h2>
        <p>Нажмите кнопку, чтобы вернуться в Todo App:</p>
    </div>
    
    <button class="btn" onclick="sendTokenToApp()">ВЕРНУТЬСЯ В ПРИЛОЖЕНИЕ</button>

    <script>
        // 1. Берем токен
        const hash = window.location.hash;

        function sendTokenToApp() {
            if (!hash) {
                document.getElementById('msg').innerText = "❌ Ошибка: Токен не найден";
                return;
            }

            // Пытаемся разбудить Windows (todoapp://)
            window.location.href = "todoapp://oauth" + hash;

            // Пытаемся вернуться в Web (localhost)
            // Пытаемся найти адрес, откуда пришли, или используем стандартные порты
            const currentHost = window.location.origin;
            const referrer = document.referrer;
            
            // Если мы пришли с локалхоста - возвращаемся туда
            if (referrer && (referrer.includes('localhost') || referrer.includes('127.0.0.1'))) {
                window.location.href = referrer + hash;
            } else {
                // Если реферер пустой, пробуем самые частые порты Flutter Web
                window.location.href = "http://localhost:5000/" + hash;
            }
        }

        // Авто-попытка только через 2 секунды (чтобы не было чехарды)
        if (hash) {
            setTimeout(sendTokenToApp, 2000);
        }
    </script>
</body>
</html>
