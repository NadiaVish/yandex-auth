<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Вход выполнен!</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f4f7f9; }
        .btn { background: #3498db; color: white; padding: 18px 30px; border: none; border-radius: 12px; font-size: 18px; cursor: pointer; text-decoration: none; margin: 10px; display: inline-block; width: 300px; font-weight: bold; }
        .web-btn { background: #2ecc71; }
        #debug-log { margin-top: 40px; color: #666; font-size: 12px; border-top: 1px solid #ddd; padding-top: 20px; }
    </style>
</head>
<body>
    <h2>✅ Авторизация успешна</h2>
    <p>Выберите, куда вы хотите вернуться:</p>
    
    <button class="btn" onclick="openWindows()">В ПРИЛОЖЕНИЕ (WINDOWS)</button>
    <br>
    <button class="btn web-btn" onclick="openWeb()">В БРАУЗЕР (WEB)</button>

    <div id="debug-log">Инициализация логов...</div>

<script>
    const hash = window.location.hash;
    const urlParams = new URLSearchParams(window.location.search);
    
    // Ищем state (наш порт) везде
    let origin = urlParams.get('state');
    if (!origin && hash.includes('state=')) {
        const hashParams = new URLSearchParams(hash.substring(1));
        origin = hashParams.get('state');
    }

    function returnToApp() {
        if (!hash) return;

        // Если мы в ВЕБЕ (есть origin), просто меняем адрес ТЕКУЩЕЙ вкладки
        if (origin && origin !== 'pc_version') {
            window.location.href = origin + "/" + hash;
        } else {
            // Если мы на Windows, будим приложение по протоколу
            window.location.href = "todoapp://oauth" + hash;
            // И пишем текст, чтобы человек закрыл вкладку
            document.getElementById('msg').innerText = "✅ Готово! Можете закрыть вкладку.";
        }
    }

    // УДАЛИЛИ setTimeout(returnToApp, 1000); - теперь только по кнопке!
</script>


</body>
</html>
