<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Вход выполнен!</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f4f7f9; }
        .btn { background: #3498db; color: white; padding: 15px 25px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin: 10px; display: inline-block; width: 280px; }
        .web-btn { background: #2ecc71; } /* Зеленая для Веба */
    </style>
</head>
<body>
    <h2 id="msg">✅ Авторизация успешна</h2>
    <p>Куда вы хотите вернуться?</p>
    
    <!-- Ссылка для Windows: она просто дергает протокол -->
    <a href="#" id="winLink" class="btn">ОТКРЫТЬ ПРИЛОЖЕНИЕ (Windows)</a>
    <br>
    <!-- Ссылка для Web: она ПЕРЕХОДИТ на localhost -->
    <a href="#" id="webLink" class="btn web-btn">ВЕРНУТЬСЯ В БРАУЗЕР (Web)</a>

    <script>
        const hash = window.location.hash;
        const urlParams = new URLSearchParams(window.location.search);
        const origin = urlParams.get('state');

        if (hash) {
            // Настраиваем кнопку для Windows
            document.getElementById('winLink').href = "todoapp://oauth" + hash;
            
            // Настраиваем кнопку для Web (localhost)
            if (origin && origin !== 'pc_version') {
                document.getElementById('webLink').href = origin + "/" + hash;
            } else {
                document.getElementById('webLink').style.display = 'none';
            }
        }

        // Авто-попытка ТОЛЬКО для Windows через 1 сек
        setTimeout(() => {
            if (hash) window.location.href = "todoapp://oauth" + hash;
        }, 1000);
    </script>
</body>
</html>
