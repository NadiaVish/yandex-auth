<script>
    const hash = window.location.hash;
    const urlParams = new URLSearchParams(window.location.search);
    const debugElement = document.getElementById('debug-log');

    function log(msg) {
        if(debugElement) debugElement.innerHTML += "<br>" + msg;
        console.log(msg);
    }

    // Ищем порт (state)
    let origin = urlParams.get('state');
    if (!origin && hash.includes('state=')) {
        const hashParams = new URLSearchParams(hash.substring(1));
        origin = hashParams.get('state');
    }

    log("Hash найден: " + (hash ? "ДА" : "НЕТ"));
    log("Origin: " + origin);

    // Функция для ВЕБА
    function openWeb() {
        if (!hash) return;
        const target = origin || "http://localhost:5000";
        const finalUrl = target + "/" + hash;
        log("👉 РЕДИРЕКТ В WEB: " + finalUrl);
        window.location.href = finalUrl;
    }

    // Функция для WINDOWS (которую мы потеряли)
    function openWindows() {
        if (!hash) return;
        const winUrl = "todoapp://oauth" + hash;
        log("👉 ОТКРЫВАЕМ WINDOWS: " + winUrl);
        window.location.href = winUrl;
    }

    // Авто-попытка только через 2 секунды, чтобы ты успела сама нажать, если хочешь
    if (hash) {
        setTimeout(() => {
            log("Запуск авто-редиректа...");
            // Если мы видим, что это веб-тест (есть localhost), идем в веб
            if (origin && origin.includes('localhost')) {
                openWeb();
            } else {
                openWindows();
            }
        }, 2000);
    }
</script>
