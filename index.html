<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход выполнен!</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f4f7f9; }
        .btn { background: #3498db; color: white; padding: 18px 30px; border: none; border-radius: 12px; font-size: 18px; cursor: pointer; text-decoration: none; margin: 10px; display: inline-block; width: 300px; font-weight: bold; transition: 0.2s; }
        .web-btn { background: #2ecc71; } /* Зеленая для Web */
        .btn:hover { opacity: 0.9; transform: scale(1.02); }
    </style>
</head>
<body>
    <h2 id="msg">✅ Авторизация успешна</h2>
    <p>Куда вы хотите вернуться?</p>
    
    <!-- Кнопка для Windows-версии -->
    <a href="#" id="winLink" class="btn">В ПРИЛОЖЕНИЕ (WINDOWS)</a>
    <br>
    <!-- Кнопка для Web-версии (localhost) -->
    <a href="#" id="webLink" class="btn web-btn">В ПРИЛОЖЕНИЕ (WEB)</a>

    <script>
        const hash = window.location.hash;
        const urlParams = new URLSearchParams(window.location.search);
        const origin = urlParams.get('state');

        if (hash) {
            // Ссылка для Windows (todoapp://)
            document.getElementById('winLink').href = "todoapp://oauth" + hash;
            
            // Ссылка для Web (localhost)
            if (origin && origin !== 'pc_version') {
                document.getElementById('webLink').href = origin + "/" + hash;
            } else {
                // Если мы не знаем порт, скрываем кнопку Web
                document.getElementById('webLink').style.display = 'none';
            }
        } else {
            document.getElementById('msg').innerText = "❌ Ошибка: Токен не найден";
        }
    </script>
</body>
</html>
