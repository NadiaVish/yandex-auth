<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Авторизация выполнена</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 80px; background: #f4f7f9; }
        .btn { background: #d88dc9; color: white; padding: 18px 30px; border: none; border-radius: 12px; 
               font-size: 18px; cursor: pointer; font-weight: bold; width: 300px; margin: 20px; }
    </style>
</head>
<body>
    <h2>✅ Авторизация успешна</h2>
    <p id="instruction">Определяем платформу...</p>
    
    <button id="winBtn" class="btn" onclick="handleWindows()" style="display:none;">В ПРИЛОЖЕНИЕ (WINDOWS)</button>
    <button id="webBtn" class="btn" onclick="handleWeb()" style="display:none;">ЗАВЕРШИТЬ ВХОД</button>

    <script>
        const hash = window.location.hash;
        const urlParams = new URLSearchParams(window.location.search);
        let origin = urlParams.get('state');
        if (!origin && hash.includes('state=')) {
            const hashParams = new URLSearchParams(hash.substring(1));
            origin = hashParams.get('state');
        }

        const isWeb = origin !== null && origin.includes('http');

        if (isWeb) {
            document.getElementById('webBtn').style.display = 'inline-block';
            document.getElementById('instruction').innerText = "Сейчас вернём вас обратно в приложение...";
            // Автоматически редиректим обратно (без кнопки — удобнее)
            setTimeout(() => handleWeb(), 800);
        } else {
            document.getElementById('winBtn').style.display = 'inline-block';
            document.getElementById('instruction').innerText = "Нажмите кнопку, чтобы открыть приложение.";
        }

        function handleWindows() {
            if (!hash) return;
            const appUrl = "todoapp://oauth" + hash;
            const iframe = document.createElement("iframe");
            iframe.style.display = "none";
            iframe.src = appUrl;
            document.body.appendChild(iframe);

            // Пытаемся закрыть вкладку мягко
            setTimeout(() => {
                window.open('', '_self');
                window.close();
            }, 500);
        }

        function handleWeb() {
            if (!hash || !origin) return;
            
            // Важно: редиректим в ИСХОДНУЮ вкладку, добавляя флаг close=true
            let targetUrl = origin;
            if (targetUrl.includes('#')) {
                targetUrl += hash.replace('#', '&'); // если уже есть hash
            } else {
                targetUrl += "/#" + hash.substring(1);
            }
            if (!targetUrl.includes('close=true')) {
                targetUrl += (targetUrl.includes('?') ? '&' : '?') + 'close=true';
            }

            window.location.href = targetUrl;   // ← это остаётся в той же вкладке!
            
            // Не закрываем сразу — пусть Flutter сам обработает и почистит URL
        }
    </script>
</body>
</html>
