<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Вход выполнен!</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 100px; background: #f4f7f9; }
        .btn { background: #3498db; color: white; padding: 18px 30px; border: none; border-radius: 12px; font-size: 18px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h2 id="msg">✅ Авторизация успешна</h2>
    <p>Нажмите кнопку, чтобы завершить вход:</p>
    
    <button class="btn" onclick="returnToApp()">ВЕРНУТЬСЯ В ПРИЛОЖЕНИЕ</button>

    <script>
        const hash = window.location.hash;
        const urlParams = new URLSearchParams(window.location.search);
        const origin = urlParams.get('state');

        function returnToApp() {
            if (!hash) return;

            // 1. Пытаемся разбудить Windows (todoapp://)
            window.location.href = "todoapp://oauth" + hash;

            // 2. Если есть origin (для Web), через секунду редиректим вкладку
            if (origin && origin !== 'pc_version') {
                setTimeout(() => {
                    window.location.href = origin + "/" + hash;
                }, 500);
            }
        }

        // Авто-попытка через 1 секунду
        if (hash) {
            setTimeout(returnToApp, 1000);
        }
    </script>
</body>
</html>
