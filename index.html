<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Вход выполнен!</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f4f7f9; }
        .btn { background: #3498db; color: white; padding: 15px 25px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; text-decoration: none; margin: 10px; display: inline-block; width: 300px; font-weight: bold; }
        .web-btn { background: #2ecc71; }
    </style>
</head>
<body>
    <h2 id="msg">✅ Авторизация успешна</h2>
    <p>Нажмите на кнопку ниже:</p>
    
    <!-- Ссылка для Windows -->
    <a href="#" id="winLink" class="btn">ОТКРЫТЬ ПРИЛОЖЕНИЕ</a>
    <br>
    <!-- Ссылка для Web (localhost) -->
    <a href="#" id="webLink" class="btn web-btn">ВЕРНУТЬСЯ В БРАУЗЕР (WEB)</a>

    <script>
        const hash = window.location.hash;
        const urlParams = new URLSearchParams(window.location.search);
        const origin = urlParams.get('state');

        if (hash) {
            // Настраиваем ссылку для Windows (протокол todoapp://)
            document.getElementById('winLink').href = "todoapp://oauth" + hash;
            
            // Настраиваем ссылку для Web (редирект на localhost)
            if (origin && origin !== 'pc_version') {
                document.getElementById('webLink').href = origin + "/" + hash;
            } else {
                document.getElementById('webLink').style.display = 'none';
            }
        }

        // Авто-попытка только для Windows (часто срабатывает без клика)
        setTimeout(() => {
            if (hash) window.location.href = "todoapp://oauth" + hash;
        }, 1000);
    </script>
</body>
</html>
