<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход выполнен!</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 80px; background: #f4f7f9; }
        /* Синяя кнопка для Windows */
        .btn-win { background: #d88dc9; color: white; padding: 18px 30px; border: none; border-radius: 12px; font-size: 18px; cursor: pointer; font-weight: bold; display: none; width: 300px; }
        /* Зеленая кнопка для Web */
        .btn-web { background: #d88dc9; color: white; padding: 18px 30px; border: none; border-radius: 12px; font-size: 18px; cursor: pointer; font-weight: bold; display: none; width: 300px; }
    </style>
</head>
<body>
    <h2>✅ Авторизация успешна</h2>
    <p id="instruction">Определяем платформу...</p>
    
    <button id="winBtn" class="btn-win" onclick="handleWindows()">В ПРИЛОЖЕНИЕ (WINDOWS)</button>
    <button id="webBtn" class="btn-web" onclick="handleWeb()">ЗАВЕРШИТЬ ВХОД (WEB)</button>

    <script>
        const hash = window.location.hash;
        const urlParams = new URLSearchParams(window.location.search);
        
        // Ищем порт (state), который прислал Flutter
        let origin = urlParams.get('state');
        if (!origin && hash.includes('state=')) {
            const hashParams = new URLSearchParams(hash.substring(1));
            origin = hashParams.get('state');
        }

        // Если есть origin (http...) — это Web. Если нет — Windows.
        const isWeb = origin !== null && origin.includes('http');

        if (isWeb) {
            document.getElementById('webBtn').style.display = 'inline-block';
            document.getElementById('instruction').innerText = "Нажмите кнопку, чтобы вернуться в браузерную версию.";
        } else {
            document.getElementById('winBtn').style.display = 'inline-block';
            document.getElementById('instruction').innerText = "Нажмите кнопку, чтобы открыть приложение на ПК.";
        }

        // Логика для Windows (Только по нажатию!)
        function handleWindows() {

if (!hash) return;

                const appUrl = "todoapp://oauth" + hash;
    const iframe = document.createElement("iframe");
    iframe.style.display = "none";
    iframe.src = appUrl;
    document.body.appendChild(iframe);
            
            window.open('', '_self', ''); 
            // window.location.href = "todoapp://oauth" + hash;
            // Хак для закрытия
            setTimeout(() => { window.close(); }, 30);
        }

        // Логика для Web (Сохранение + Редирект + Авто-закрытие во Flutter)
        function handleWeb() {
            if (!hash || !origin) return;
            //window.location.href = origin + "/" + hash + "&close=true";
             const targetUrl = origin + "/#" + hash.replace('#', '') + "&close=true";
            window.location.href = targetUrl;
             setTimeout(() => { window.close(); }, 300);
        }


        

        
        // НИКАКИХ АВТО-ПЕРЕХОДОВ ТУТ НЕТ. Ждем клика.
    </script>
</body>
</html>
