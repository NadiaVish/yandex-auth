<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Вход выполнен!</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f4f7f9; }
        .btn { background: #3498db; color: white; padding: 15px 25px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin: 10px; display: inline-block; width: 280px; }
        .web-btn { background: #2ecc71; }
    </style>
</head>
<body>
    <h2 id="msg">✅ Авторизация успешна</h2>
    <p>Выберите, куда вернуться:</p>
    
    <!-- Кнопка для Windows версии -->
    <button class="btn" onclick="openWindowsApp()">ОТКРЫТЬ ПРИЛОЖЕНИЕ (Windows)</button>
    <br>
    <!-- Кнопка для Web версии (localhost) -->
    <button class="btn web-btn" id="webBtn" onclick="openWebApp()">ВЕРНУТЬСЯ В БРАУЗЕР (Web)</button>

    <script>
        const hash = window.location.hash;
        const urlParams = new URLSearchParams(window.location.search);
        const origin = urlParams.get('state');

        function openWindowsApp() {
            if (hash) window.location.href = "todoapp://oauth" + hash;
        }

        function openWebApp() {
            if (hash && origin) {
                // Прямой переход на твой localhost с токеном
                window.location.href = origin + "/" + hash;
            } else {
                alert("Не удалось определить адрес локального сервера.");
            }
        }

        // Авто-попытка для Web через 1 секунду, если мы видим localhost
        if (hash && origin) {
            setTimeout(openWebApp, 1000);
        }
    </script>
</body>
</html>
