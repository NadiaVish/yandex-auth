<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход выполнен!</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 80px; background: #f4f7f9; }
        .btn { background: #3498db; color: white; padding: 18px 30px; border: none; border-radius: 12px; font-size: 18px; cursor: pointer; text-decoration: none; margin: 10px; display: none; width: 300px; font-weight: bold; }
        .web-btn { background: #2ecc71; }
    </style>
</head>
<body>
    <h2>✅ Авторизация успешна</h2>
    <p id="instruction">Загрузка...</p>
    
    <!-- Кнопка для Windows -->
    <button id="winBtn" class="btn" onclick="handleWindows()">ВЕРНУТЬСЯ В ПРИЛОЖЕНИЕ</button>
    
    <!-- Кнопка для Web -->
    <button id="webBtn" class="btn web-btn" onclick="handleWeb()">ЗАВЕРШИТЬ ВХОД</button>

 <script>
    const hash = window.location.hash;
    const urlParams = new URLSearchParams(window.location.search);
    
    // 1. Умный поиск state (порта)
    let origin = urlParams.get('state');
    if (!origin && hash.includes('state=')) {
        const hashParams = new URLSearchParams(hash.substring(1));
        origin = hashParams.get('state');
    }

    const isWeb = origin !== null;

    if (isWeb) {
        document.getElementById('webBtn').style.display = 'inline-block';
        document.getElementById('instruction').innerText = "Нажмите кнопку, чтобы завершить вход.";
    } else {
        document.getElementById('winBtn').style.display = 'inline-block';
        document.getElementById('instruction').innerText = "Возвращаем вас в приложение...";
    }

    function handleWindows() {
        if (hash) {
            window.location.href = "todoapp://oauth" + hash;
             setTimeout(() => {
            window.open('', '_self', ''); 
            window.close();
        }, 100); 
        }
    }

    function handleWeb() {
        if (!hash || !origin) {
            alert("Не удалось определить адрес приложения.");
            return;
        }

        // ВАЖНО: Мы переходим на localhost текущей вкладкой.
        // Это обновит адресную строку ПЕРВОЙ вкладки (через DeepLinkHandler) 
        // или позволит нажать "ГОТОВО" после записи в Storage.
        // Добавляем флаг &close=true, чтобы Flutter понял: "сохрани и закрой вкладку".
        window.location.href = origin + "/" + hash + "&close=true";
         setTimeout(() => { window.close(); }, 100);
    }
</script>

</body>
</html>
