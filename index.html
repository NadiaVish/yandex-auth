<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Вход выполнен!</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f4f7f9; }
        .btn { background: #3498db; color: white; padding: 18px 30px; border: none; border-radius: 12px; font-size: 18px; cursor: pointer; text-decoration: none; margin: 10px; display: inline-block; width: 300px; font-weight: bold; }
        .web-btn { background: #2ecc71; }
    </style>
</head>
<body>
    <h2>✅ Авторизация успешна</h2>
    <p>Выберите, куда вы хотите вернуться:</p>
    
    <!-- Кнопка для Windows-версии (разбудит установленное приложение) -->
    <button class="btn" onclick="openWindows()">В ПРИЛОЖЕНИЕ (WINDOWS)</button>
    <br>
    <!-- Кнопка для Web-версии (обновит текущую вкладку с localhost) -->
    <button class="btn web-btn" onclick="openWeb()">В ЭТУ ВКЛАДКУ (WEB)</button>

   <script>
    const hash = window.location.hash;
    
    function handleAuth() {
        if (!hash) return;

        // 1. Пытаемся разбудить Windows (если нужно)
        window.location.href = "todoapp://oauth" + hash;

        // 2. СОХРАНЯЕМ ТОКЕН В ОБЩУЮ ПАМЯТЬ БРАУЗЕРА
        // Это позволит ПЕРВОЙ вкладке увидеть его через SecureStorage
        const params = new URLSearchParams(hash.substring(1));
        const token = params.get('access_token');
        
        if (token) {
            // Ключ, который обычно ищет flutter_secure_storage в вебе
            localStorage.setItem('yandex_token', token); 
            
            document.getElementById('msg').innerText = "✅ Авторизация успешна!";
            document.getElementById('sub-msg').innerText = "Теперь просто ЗАКРОЙТЕ ЭТУ ВКЛАДКУ и нажмите 'ГОТОВО' в приложении.";
        }
    }
    
    if (hash) handleAuth();
</script>

</body>
</html>
