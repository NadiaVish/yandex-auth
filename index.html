<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Вход выполнен!</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 100px; background: #f4f7f9; }
        .btn { background: #3498db; color: white; padding: 18px 30px; border: none; border-radius: 12px; font-size: 18px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h2 id="msg">✅ Авторизация успешна</h2>
    <p>Нажмите кнопку, чтобы завершить вход:</p>
    
    <button class="btn" onclick="returnToApp()">ВЕРНУТЬСЯ В ПРИЛОЖЕНИЕ</button>

    <script>
        const hash = window.location.hash;
        const urlParams = new URLSearchParams(window.location.search);
        const origin = urlParams.get('state');

        function returnToApp() {
    if (!hash) return;

    // 1. Пытаемся разбудить Windows (через невидимую ссылку)
    const appLink = "todoapp://oauth" + hash;
    const iframe = document.createElement("iframe");
    iframe.style.display = "none";
    iframe.src = appLink;
    document.body.appendChild(iframe);

    // 2. СРАЗУ ЖЕ делаем редирект для Web в этой же вкладке
    // Это обновит адрес твоего Web-приложения на localhost
    if (origin && origin !== 'pc_version') {
        setTimeout(() => {
            window.location.href = origin + "/" + hash;
        }, 300); 
    }
}

    </script>
</body>
</html>
